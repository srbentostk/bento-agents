<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>webview-ui</title>
  </head>
  <body>
    <div id="root">
      <div id="bento-preloader" style="
        width:100%;height:100%;display:flex;flex-direction:column;
        align-items:center;justify-content:center;
        background:#0d0e1a;color:#c8a020;font-family:monospace;
        position:absolute;inset:0;z-index:9999;
      ">
        <div style="font-size:28px;letter-spacing:4px;margin-bottom:12px;font-weight:bold;">
          B.E.N.T.O.
        </div>
        <div style="font-size:13px;color:#c8b890b3;margin-bottom:20px;">
          Inicializando sistemas da agência...
        </div>
        <div style="
          width:120px;height:3px;background:#1a1b2e;border-radius:2px;overflow:hidden;
        ">
          <div style="
            width:40%;height:100%;background:#c8a020;border-radius:2px;
            animation:bento-load 1.2s ease-in-out infinite;
          "></div>
        </div>
        <style>
          @keyframes bento-load {
            0%{transform:translateX(-100%)}
            50%{transform:translateX(200%)}
            100%{transform:translateX(-100%)}
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
